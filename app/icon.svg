<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="northofamer">
  <!--
    Favicon for northofamer — minimal mark.
    A single warm-gold dot on a dark rounded tile.
    Same accent dot used throughout the site (nav marker,
    footer wordmark period, section markers).

    Colors come straight from the design tokens:
      bg   #0a0a08 → tailwind ink-800   (matches body + themeColor)
      gold #c7a878 → tailwind accent.DEFAULT
  -->
  <rect width="64" height="64" rx="12" fill="#0a0a08"/>
  <circle cx="32" cy="32" r="9" fill="#c7a878"/>
</svg>
